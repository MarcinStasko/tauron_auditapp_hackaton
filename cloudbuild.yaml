# Optional Cloud Build pipeline for the frontend image.
#
# Local Docker Compose remains the primary deployment target for this repo.
# If you still need a remote image build, pass the same frontend env contract used locally:
#   _SERVICE_NAME                    e.g. tauron-auditapp
#   _REGION                          europe-central2
#   _AR_REPO                         Artifact Registry repo name
#   _VITE_SUPABASE_PUBLISHABLE_KEY   local or remote anon key
#   _VITE_SUPABASE_URL               Supabase API base URL
#   _VITE_GEOCODER_URL               optional geocoder URL

substitutions:
  _SERVICE_NAME: tauron-auditapp
  _REGION: europe-central2
  _AR_REPO: cloud-run-source-deploy
  _VITE_GEOCODER_URL: https://nominatim.openstreetmap.org/search

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest'

steps:
  # 1. Build the Docker image, passing frontend VITE_* vars as build args
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_SUPABASE_PUBLISHABLE_KEY=${_VITE_SUPABASE_PUBLISHABLE_KEY}
      - --build-arg
      - VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}
      - --build-arg
      - VITE_GEOCODER_URL=${_VITE_GEOCODER_URL}
      - -t
      - 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - -t
      - 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest'
      - .

  # 2. Push both tags
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: ['push', 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA']
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: ['push', 'europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest']

  # 3. Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=europe-central2-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
